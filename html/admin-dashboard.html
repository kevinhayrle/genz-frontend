<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Admin Dashboard | Genz</title>

  <link rel="icon" href="/assets/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/css/admin-dashboard.css" />
  <link rel="stylesheet" href="/css/preloader.css">

</head>

<body>

  <!---------------------------------------------------->

  <!-- PRELOADER -->

<div id="preloader">
  <h1 class="preloader-text">Genz</h1>
</div>

  <!---------------------------------------------------->

  <!-- SIDEBAR -->

  <aside class="sidebar">
    <div class="sidebar-top">
      <h2>ADMIN</h2>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->

  <main class="main">
    <h1 class="brand-title">Genz</h1>

  <!-- ADD / EDIT PRODUCT -->

    <section class="card">
      <h3>Add / Edit Product</h3>

      <form id="productForm">

  <!-- CATEGORY -->

        <select id="category" required>
          <option value="">Select Category</option>

          <optgroup label="Materials">
            <option value="shirts">Shirts</option>
            <option value="trousers">Trousers</option>
            <option value="tshirts">Tshirts</option>
            <option value="jeans">Jeans</option>
            <option value="cargos">cargos</option>
            <option value="jackets">Jackets</option>
          </optgroup>

          <optgroup label="Other Materials">
            <option value="shoes">Shoes</option>
            <option value="chains">Chains</option>
          </optgroup>
        </select>

  <!-- SIZES -->

        <div class="form-field">
        <input
          id="sizes"
          type="text"
          placeholder="Sizes (comma separated) e.g. S, M, L"
         />
        </div>

  <!-- PRODUCT NAME -->

        <input
          id="name"
          type="text"
          placeholder="Product Name *"
          required
        />

  <!-- DESCRIPTION -->

        <input
          id="description"
          type="text"
          placeholder="Description"
        />

  <!-- PRICE -->

        <input
          id="price"
          type="number"
          placeholder="Price *"
          min="0"
          required
        />

  <!-- DISCOUNTED PRICE -->

        <input
          id="discounted_price"
          type="number"
          placeholder="Discounted Price"
          min="0"
        />


  <!-- MAIN IMAGE -->

        <input
          id="image_url"
          type="text"
          placeholder="Main Image URL *"
          required
        />

  <!-- EXTRA IMAGES -->

        <input
          id="extraImages"
          type="text"
          placeholder="Extra Image URLs (comma separated)"
        />

        <button type="submit">Save Product</button>
      </form>
    </section>

  <!-- ALL PRODUCTS -->

    <div class="container">
      <h2>All Products</h2>
      <div id="productList"></div>
    </div>

  <!-- COUPON MANAGEMENT -->

    <div class="container">
      <h2>Coupon Management</h2>

      <form id="couponForm">
        <input
          id="coupon_code"
          type="text"
          placeholder="Coupon Code"
        />

        <select id="discount_type">
          <option value="percentage">Percentage</option>
          <option value="fixed">Flat</option>
        </select>

        <input
          id="discount_value"
          type="number"
          placeholder="Discount Value"
          min="0"
        />

        <input
          id="min_cart_value"
          type="number"
          placeholder="Minimum Cart Value"
          min="0"
        />

        <input
          id="max_discount"
          type="number"
          placeholder="Max Discount"
          min="0"
        />

        <input
          id="expiry_date"
          type="date"
        />

        <button type="submit" class="btn">Add Coupon</button>
      </form>
    </div>

  <!-- ALL COUPONS -->

    <div class="container">
      <h2>All Coupons</h2>
      <div id="couponList"></div>
    </div>

  </main>

  <!---------------------------------------------------->

  <!-- SCRIPTS -->

  <script src="/js/config.js"></script>
  <script src="../js/admin-dashboard.js"></script>
  <script src="/js/preloader.js"></script>
  
</body>
</html>
